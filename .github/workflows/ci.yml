name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  integration:
    name: API integration (IDOR) tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: squad
          POSTGRES_PASSWORD: squad
          POSTGRES_DB: squadswarm
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://squad:squad@localhost:5432/squadswarm
      DATABASE_DRIVER: pg
      JWT_SECRET: ci-testing-secret-at-least-32-characters-long
      TEST_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm --filter @squadswarm/db migrate:pg
      - name: Start app
        run: |
          pnpm --filter web dev &
          npx wait-on http://localhost:3000/api/health --timeout 60000
      - name: Run integration tests
        run: pnpm test:integration

  contracts:
    name: Solidity tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
      - run: forge test -vvv
